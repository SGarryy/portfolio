<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume — Gaurav Singh</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1A2A'/><text y='.9em' font-size='68' font-family='serif' x='8' fill='%23E8623A'>G</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:    #F9F5EC;
      --ink:      #1A1A2A;
      --accent:   #E8623A;
      --green:    #6BAA75;
      --blue:     #4A90D9;
      --ink-mid:  rgba(26,26,42,.5);
      --ink-faint:rgba(26,26,42,.1);
    }

    html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'Nunito', sans-serif; }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 28px;
      background: rgba(249,245,236,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1.5px solid var(--ink-faint);
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 999px;
      border: 2px solid var(--ink); background: transparent;
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; font-weight: 500;
      color: var(--ink); text-decoration: none; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 3px 3px 0 rgba(26,26,42,.1);
    }
    .back-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 rgba(26,26,42,.14); }

    .topbar-title {
      font-family: 'Caveat', cursive;
      font-size: 1.45rem; font-weight: 700; color: var(--ink);
    }
    .topbar-title span { color: var(--accent); }

    .download-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 22px; border-radius: 999px;
      border: 2px solid var(--accent);
      background: rgba(232,98,58,.07);
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; font-weight: 500;
      color: var(--accent); text-decoration: none; cursor: pointer;
      box-shadow: 3px 3px 0 rgba(232,98,58,.18);
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .download-btn:hover {
      transform: translate(-2px,-2px);
      box-shadow: 5px 5px 0 rgba(232,98,58,.28);
      background: rgba(232,98,58,.13);
    }

    /* ── BODY ── */
    .viewer-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px 60px;
      min-height: calc(100vh - 60px);
    }

    /* ── PDF IFRAME ── */
    .pdf-container {
      width: 100%; max-width: 880px;
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 10px 50px rgba(26,26,42,.13), 0 2px 8px rgba(26,26,42,.07);
      border: 1.5px solid var(--ink-faint);
      background: #fff;
    }
    .pdf-container iframe {
      display: block; width: 100%; height: 88vh; border: none;
    }

    /* ── EMPTY STATE (no PDF yet) ── */
    .empty-state {
      width: 100%; max-width: 600px; margin-top: 20px;
      text-align: center;
      padding: 64px 40px;
      border: 2.5px dashed rgba(26,26,42,.18);
      border-radius: 20px;
      background: rgba(255,255,255,.6);
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(232,98,58,.08); border: 2px solid rgba(232,98,58,.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .empty-title {
      font-family: 'Caveat', cursive;
      font-size: 1.9rem; font-weight: 700;
    }
    .empty-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; color: var(--ink-mid); line-height: 1.8;
    }
    .empty-sub strong { color: var(--ink); }
    .empty-steps {
      text-align: left; width: 100%;
      background: rgba(26,26,42,.03);
      border: 1px solid var(--ink-faint);
      border-radius: 12px; padding: 18px 22px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; color: var(--ink-mid); line-height: 2;
    }
    .empty-steps code {
      background: rgba(26,26,42,.07); padding: 1px 7px; border-radius: 4px;
      color: var(--accent);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      .topbar { padding: 10px 16px; }
      .topbar-title { font-size: 1.1rem; }
      .download-btn .dl-label { display: none; }
      .pdf-container iframe { height: 78vh; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html" class="back-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
      <div class="topbar-title">Gaurav Singh — <span>Resume</span></div>
    </div>

    <a id="dlBtn" class="download-btn" href="../assets/resume/gaurav-singh-resume.pdf" download="Gaurav_Singh_Resume.pdf">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span class="dl-label">Download PDF</span>
    </a>
  </div>

  <div class="viewer-wrap">

    <!-- shown when PDF is found -->
    <div class="pdf-container" id="pdfContainer" style="display:none">
      <iframe id="pdfFrame" title="Gaurav Singh Resume"></iframe>
    </div>

    <!-- shown when PDF is missing -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#E8623A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <div class="empty-title">Resume coming soon</div>
      <p class="empty-sub">
        Add your PDF to <strong>assets/resume/</strong><br>
        and name it exactly: <strong>gaurav-singh-resume.pdf</strong>
      </p>
      <div class="empty-steps">
        1. Export your resume as a <code>.pdf</code><br>
        2. Rename it → <code>gaurav-singh-resume.pdf</code><br>
        3. Drop it into <code>assets/resume/</code><br>
        4. Reload this page — it appears automatically ✓
      </div>
    </div>

  </div>

  <script>
    const PDF = '../assets/resume/gaurav-singh-resume.pdf';
    const isFileProtocol = window.location.protocol === 'file:';

    if (isFileProtocol) {
      showPDF(PDF);
    } else {
      fetch(PDF, { method: 'HEAD' })
        .then(r => {
          if (r.ok) {
            showPDF(PDF);
            return;
          }

          if (r.status === 405) {
            return fetch(PDF).then(fileResponse => {
              if (fileResponse.ok) showPDF(PDF);
            });
          }
        })
        .catch(() => {}); // empty state stays visible
    }

    function showPDF(src) {
      document.getElementById('pdfFrame').src = src;
      document.getElementById('pdfContainer').style.display = 'block';
      document.getElementById('emptyState').style.display  = 'none';
    }
  </script>

</body>
</html>
